<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Event Horizon Crossed</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #F59E0B;
      --accent: #F97316;
      --aegis-white: #FFFFFF;
      --aegis-gray: #CBD5E1;
      --bg-dark: #070913;
      --font-sans: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--aegis-white);
      font-family: var(--font-sans);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      background-image: radial-gradient(circle at center, rgba(245, 158, 11, 0.08) 0%, transparent 60%);
    }

    .error-card {
      background: rgba(7, 9, 19, 0.85);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      max-width: 500px;
      width: calc(100% - 48px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
    }

    .kicker {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      letter-spacing: -1.5px;
      margin: 0 0 20px 0;
      line-height: 1.2;
    }

    p {
      color: var(--aegis-gray);
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 40px 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      color: #000000;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      padding: 14px 28px;
      border-radius: 100px;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(249, 115, 22, 0.5);
    }
  </style>
</head>
<body>

  <div class="error-card">
    <div class="kicker">404 // SIGNAL LOST</div>
    <h1>Beyond Event Horizon</h1>
    <p>You have crossed the event horizon. The coordinates you requested have collapsed into the Schwarzschild singularity.</p>
    <a href="index.html" class="btn">Re-establish Signal</a>
  </div>

</body>
</html>
